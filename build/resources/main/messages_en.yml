# SyncShield Messages Configuration (English)
# ---------------------------------------------------------
# Note: You can use HTML tags like <b>, <i>, <code>, etc. in Telegram messages.
# Minecraft messages support color codes with '&' (e.g., &a, &c) and \n for line breaks.
# Placeholders like %player% or %ip% are shown under each message.
# Special placeholders are listed below each message.

# --- Minecraft (In-Game) Messages ---

# Message shown when an IP is blacklisted and the player tries to join.
kick-blacklisted: "Your IP is blacklisted!"

# Message shown when an OP account is not linked to Telegram.
# %code% - Link code for the player.
kick-unlinked: "OP protection is active! Your account is not linked to Telegram. \n\nSend this code to the bot: %code% \nUse command: /mclink %code%"

# Message shown when a 2FA check is pending.
kick-2fa: "2FA check! Open Telegram to approve your login."

# Usage for the /syncshield settings command.
# This is shown in-game when the player provides invalid syntax.
mc-settings-usage: "Usage: /syncshield settings <mode> (always|session|whitelist|disabled)"

# Response for /syncshield settings success.
# %mode% - The new mode set.
mc-settings-updated: "✅ Your 2FA mode has been updated to %mode%"

# Response for /syncshield settings with an invalid mode.
mc-settings-invalid-mode: "❌ Invalid mode! Use: always, session, whitelist, disabled"

# Usage for the main plugin command.
# This is shown in-game for missing or invalid subcommands.
ss-usage: "Usage: /syncshield <link|settings|config|reload>"

# Message for players without permission to use the command.
ss-no-permission: "❌ You do not have permission to use this command."

# Message shown after /syncshield link.
# %code% - Link code for the player.
mc-link-code: "Your link code is: %code%. Send it to the Telegram bot."

# Response for /syncshield link when the account is already linked.
mc-already-linked: "Your account is already linked to Telegram."

# Message sent to the player when a message is received from Telegram admin.
# %message% - The message text.
# You can include prefixes like [Admin] or custom formatting.
mc-msg-format: "[Console -> You] %message%"

# Error for non-player command execution.
mc-player-only: "This command can only be used by players!"

# Error when setting config fails.
# %error% - The error message.
mc-config-error: "❌ Error setting config: %error%"

# Reason used in Minecraft kick messages triggered by bot.
# This is shown in the player's disconnect screen.
mc-kick-reason: "Kicked by Telegram Admin"

# Reason used in Minecraft ban messages triggered by bot.
# This is shown to the player when banned.
mc-ban-reason: "Banned by Telegram Admin"


# --- Telegram (Bot) Messages ---

# Notification when an OP joins.
# %player% - Player name.
ss-admin-join: "👤 Player Join: %player% (OP)"

# Notification when an OP quits.
ss-admin-quit: "👋 Player Quit: %player% (OP)"

# Notification when an OP issues a command.
# %command% - Command issued.
ss-admin-cmd: "💻 Command: %player% issued %command%"

# Alert when someone tries to join from a blacklisted IP.
# %ip% - IP address.
ss-admin-blacklist-attempt: "🚫 Blacklisted IP join attempt: %player% (%ip%)"

# Alert when an unlinked OP tries to join.
ss-admin-unlinked-attempt: "⚠️ Unlinked OP join attempt: %player% (%ip%)"

# The 2FA prompt sent to the bot when someone tries to log in.
ss-2fa-prompt: "🔑 Login attempt from IP: %ip%\n\nPlayer: %player%"

# Confirmation after approving a login.
ss-approved: "✅ IP %ip% approved for %player%"

# Notification after denying a login.
ss-denied: "❌ Login denied for %ip%"

# Confirmation after blacklisting an IP.
ss-blacklisted: "🚫 IP %ip% has been blacklisted for player %player%"

# Header for managing a player via bot.
ss-manage-player: "Managing player: %player%"

# Success message after kicking a player.
ss-kicked: "✅ Kicked %player%"

# Error when trying to manage an offline player.
ss-not-online: "❌ Player not online."

# Success message after banning a player.
ss-banned: "✅ Banned %player%"

# Prompt when admin wants to send a message to a player.
ss-msg-prompt: "Please type the message to send to %player%:"

# Confirmation that a message was sent to Minecraft.
ss-msg-sent: "✅ Message sent to %player%"

# Message when there are no players on the server.
ss-no-players: "No players online."

# Header for player selection menu.
ss-select-player: "Select a player to manage:"

# Message when a bot interaction is cancelled.
ss-cancelled: "✅ Interaction cancelled."

# Message when an account is successfully linked.
ss-linked: "✅ Your account has been linked to Minecraft player: %player%"

# Error when a non-admin tries to use admin-only commands.
ss-unauthorized: "🚫 You are not authorized to run RCON commands."

# Usage message for /rcon.
ss-rcon-usage: "Usage: /rcon &lt;command&gt;"

# Usage message for /mclink.
ss-mclink-usage: "Usage: /mclink &lt;code&gt;"

# Error for expired or invalid link codes.
ss-invalid-code: "❌ Invalid or expired code."

# Notification for server start.
ss-server-start: "🚀 Server started!"

# Notification for server stop.
ss-server-stop: "🛑 Server stopped!"

# Error for unauthorized config changes.
ss-unauthorized-config: "❌ You are not authorized to edit config."

# Usage message for the bot config command.
# %path% - The config path.
# %value% - The config value.
ss-config-usage: "Usage: /syncshield config <path> <value>"

# Confirmation for config updates.
ss-config-updated: "✅ Config %path% set to %value%"

# Confirmation after /syncshield reload.
ss-reloaded: "✅ Plugin configuration and messages reloaded."

# Header for the 2FA settings menu for a player.
ss-2fa-settings-menu: "2FA Settings for %player%:"

# Header for the global default 2FA settings menu.
ss-default-2fa-menu: "Default 2FA Settings (for OPs/New Players):"

# Label for current 2FA mode.
ss-2fa-mode-current: "Current mode: %mode%"

# Confirmation after updating 2FA mode for a player.
ss-2fa-mode-updated: "✅ 2FA mode for %player% has been updated to %mode%"

# Header for the bot settings menu.
ss-settings-menu: "Notification Settings:"

# Status indicators.
ss-enabled: "✅"
ss-disabled: "❌"

# Welcome message sent when /start is used.
# %chatId% - Telegram chat ID.
ss-start: "Hello! Your Chat ID is: <code>%chatId%</code>\n\n<b>How to link your account:</b>\n1. Join the Minecraft server.\n2. If you are not linked, you will see a 10-character code in the kick message.\n3. Send this code to the bot here (e.g., <code>/mclink ABCDEFGHIJ</code> or just <code>ABCDEFGHIJ</code>).\n\n<b>Bot Commands:</b>\n/start - Show this help message and main menu\n/mclink &lt;code&gt; - Link your Minecraft account\n\n<b>Admin Commands (if authorized):</b>\n/players - List and manage online players\n/settings - Configure bot notification settings\n/rcon &lt;cmd&gt; - Execute a server console command (or just /&lt;cmd&gt;)\n/cancel - Cancel current interaction state"

# Header for managing your own linked account.
ss-me-menu: "Managing account: %player%"

# Confirmation after blacklisting your own current IP.
ss-blacklisted-self: "✅ Your current IP (%ip%) has been blacklisted for account %player%."

# Error message if you have no linked accounts.
ss-no-linked-accounts: "You have no linked accounts."

# Header for selecting which account to manage.
ss-select-account: "Select an account to manage:"

# Header for selecting a player to view blacklisted IPs.
ss-blacklist-players-menu: "Select a player to manage their blacklist:"

# Header for the IP blacklist list for a player.
ss-blacklist-ips-menu: "IP Blacklist for %player%:"

# Success message after removing an IP from blacklist.
ss-ip-removed: "✅ IP %ip% removed from blacklist for %player%"

# Error when no blacklisted IPs are found.
ss-no-blacklist-found: "No blacklisted IPs found."

# Error when a specific player has no blacklisted IPs.
ss-no-blacklist-player: "No blacklisted IPs for %player%."

# Error when no approved IPs are found.
ss-no-approved-ips: "No approved IPs found for %player%."

# Label for permanent IPs in whitelist.
ss-time-permanent: "Permanent"

# Header for your own blacklist.
ss-my-blacklist: "Your Blacklisted IPs (%player%):"

# Header for your own whitelist.
ss-my-whitelist: "Your Approved IPs (%player%):"

# Success message after removing an IP from whitelist.
ss-ip-removed-whitelist: "✅ IP %ip% removed from approved list for %player%"

# --- Chat Sync Formats ---

# Telegram HTML format for forwarded MC messages. Use %message% for the message itself.
# %player% is the Minecraft username.
chat-sync-telegram-format: "<b>%player%</b>: %message%"

# Minecraft chat format for forwarded TG messages. Use %message% for the message itself.
# Supports standard Minecraft color codes with '&'.
chat-sync-mc-format: "&7[SS] &f%player%: %message%"

# Telegram HTML format for advancement messages. Use %advancement% for the advancement name and %description% for its description.
# %player% is the Minecraft username.
chat-sync-advancement-format: "<i>%player%</i> has made the advancement <b>%advancement%</b> (%description%)"

# Telegram HTML format for join messages. Use %player% for player name.
# You can add emojis or tags for visual emphasis.
chat-sync-join-format: "<i>%player% joined the game</i>"

# Telegram HTML format for quit messages. Use %player% for player name.
# You can add emojis or tags for visual emphasis.
chat-sync-quit-format: "<i>%player% left the game</i>"

# Telegram HTML format for death messages. Use %player% for player name and %message% for death message.
# Death message is the raw Minecraft death message.
chat-sync-death-format: "<i>%player% died: %message%</i>"


