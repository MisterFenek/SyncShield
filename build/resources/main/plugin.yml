name: "SyncShield"
version: '1.3.1'
main: com.mrfenek.syncshield.SyncShield
api-version: '1.16'
prefix: SyncShield
load: STARTUP
authors: [ mrfenek ]
description: SyncShield — 2FA and Telegram chat sync plugin with secure login approvals and rich chat rendering
permissions:
  syncshield.use:
    description: Allow use of /syncshield link
    default: true
  syncshield.admin:
    description: Allow use of /syncshield reload and /syncshield config
    default: op
  syncshield.debug:
    description: Allow use of /syncshield debug
    default: op
commands:
  syncshield:
    description: Main command for SyncShield (2FA & Telegram chat sync)
    usage: /syncshield <link|settings|config|reload|debug>
    aliases: [ss]
