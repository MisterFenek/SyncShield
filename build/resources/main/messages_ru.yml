# Конфигурация сообщений SyncShield (Русский)
# ---------------------------------------------------------
# Note: Telegram messages support HTML tags like <b>, <i>, <code>.
# Minecraft messages support color codes with '&' and \n for line breaks.
# Placeholders like %player% or %ip% are listed under each message.
# Примечание: Вы можете использовать HTML-теги, такие как <b>, <i>, <code> и т.д. в сообщениях Telegram.
# Подсказки спецсимволов (например %player%, %ip%) приведены под каждым сообщением.
# Специальные плейсхолдеры перечислены под каждым сообщением.

# --- Сообщения в Minecraft (In-Game) ---

# Сообщение, когда IP находится в черном списке и игрок пытается зайти.
kick-blacklisted: "Ваш IP находится в черном списке!"

# Сообщение, когда OP-аккаунт не привязан к Telegram.
# %code% - Код привязки для игрока.
kick-unlinked: "Защита OP активна! Ваш аккаунт не привязан к Telegram. \n\nОтправьте этот код боту: %code% \nИспользуйте команду: /mclink %code%"

# Сообщение, когда ожидается проверка 2FA.
kick-2fa: "Проверка 2FA! Откройте Telegram, чтобы подтвердить вход."

# Использование команды /syncshield settings.
mc-settings-usage: "Использование: /syncshield settings <mode> (always|session|whitelist|disabled)"

# Ответ при успешном изменении режима 2FA.
# %mode% - Новый установленный режим.
mc-settings-updated: "✅ Ваш режим 2FA изменен на %mode%"

# Ответ при вводе неверного режима в /syncshield settings.
mc-settings-invalid-mode: "❌ Неверный режим! Используйте: always, session, whitelist, disabled"

# Использование основной команды плагина.
ss-usage: "Использование: /syncshield <link|settings|config|reload>"

# Сообщение для игроков без прав на использование команды.
ss-no-permission: "❌ У вас недостаточно прав для выполнения этой команды."

# Сообщение после выполнения /syncshield link.
# %code% - Код привязки для игрока.
mc-link-code: "Ваш код привязки: %code%. Отправьте его боту в Telegram."

# Ответ на /syncshield link, если аккаунт уже привязан.
mc-already-linked: "Ваш аккаунт уже привязан к Telegram."

# Сообщение игроку, когда администратор присылает сообщение из Telegram.
# %message% - Текст сообщения.
mc-msg-format: "[Консоль -> Вы] %message%"

# Ошибка при выполнении команды не игроком.
mc-player-only: "Эту команду могут использовать только игроки!"

# Ошибка при неудачном изменении конфига.
# %error% - Сообщение об ошибке.
mc-config-error: "❌ Ошибка при установке конфига: %error%"

# Причина кика в Minecraft, инициированного через бота.
mc-kick-reason: "Кикнут администратором через Telegram"

# Причина бана в Minecraft, инициированного через бота.
mc-ban-reason: "Забанен администратором через Telegram"


# --- Сообщения в Telegram (Бот) ---

# Уведомление о входе OP-игрока.
# %player% - Имя игрока.
ss-admin-join: "👤 Вход игрока: %player% (OP)"

# Уведомление о выходе OP-игрока.
ss-admin-quit: "👋 Выход игрока: %player% (OP)"

# Уведомление о выполнении команды OP-игроком.
# %command% - Выполненная команда.
ss-admin-cmd: "💻 Команда: %player% выполнил %command%"

# Оповещение о попытке входа с заблокированного IP.
# %ip% - IP-адрес.
ss-admin-blacklist-attempt: "🚫 Попытка входа с заблокированного IP: %player% (%ip%)"

# Оповещение о попытке входа непривязанного OP.
ss-admin-unlinked-attempt: "⚠️ Попытка входа не привязанного OP: %player% (%ip%)"

# Запрос 2FA, отправляемый боту при попытке входа.
ss-2fa-prompt: "🔑 Попытка входа с IP: %ip%\n\nИгрок: %player%"

# Подтверждение после одобрения входа.
ss-approved: "✅ IP %ip% одобрен для %player%"

# Уведомление после отклонения входа.
ss-denied: "❌ Вход отклонен для %ip%"

# Подтверждение после блокировки IP.
ss-blacklisted: "🚫 IP %ip% был заблокирован для игрока %player%"

# Заголовок меню управления игроком через бота.
ss-manage-player: "Управление игроком: %player%"

# Сообщение об успешном кике игрока.
ss-kicked: "✅ Кикнут %player%"

# Ошибка при попытке управлять игроком не в сети.
ss-not-online: "❌ Игрок не в сети."

# Сообщение об успешном бане игрока.
ss-banned: "✅ Забанен %player%"

# Запрос текста сообщения для отправки игроку.
ss-msg-prompt: "Введите сообщение для отправки %player%:"

# Подтверждение отправки сообщения в Minecraft.
ss-msg-sent: "✅ Сообщение отправлено %player%"

# Сообщение, когда на сервере нет игроков.
ss-no-players: "Нет игроков в сети."

# Заголовок меню выбора игрока.
ss-select-player: "Выберите игрока для управления:"

# Сообщение при отмене взаимодействия в боте.
ss-cancelled: "✅ Взаимодействие отменено."

# Сообщение об успешной привязке аккаунта.
ss-linked: "✅ Ваш аккаунт привязан к игроку Minecraft: %player%"

# Ошибка при попытке использовать админ-команды не админом.
ss-unauthorized: "🚫 У вас нет прав для выполнения RCON команд."

# Сообщение об использовании /rcon.
ss-rcon-usage: "Использование: /rcon &lt;команда&gt;"

# Сообщение об использовании /mclink.
ss-mclink-usage: "Использование: /mclink &lt;код&gt;"

# Ошибка при неверном или истекшем коде привязки.
ss-invalid-code: "❌ Неверный или истекший код."

# Уведомление о запуске сервера.
ss-server-start: "🚀 Сервер запущен!"

# Уведомление об остановке сервера.
ss-server-stop: "🛑 Сервер остановлен!"

# Ошибка при попытке редактирования конфига без прав.
ss-unauthorized-config: "❌ У вас нет прав для редактирования конфигурации."

# Сообщение об использовании команды конфига в боте.
# %path% - Путь в конфиге.
# %value% - Значение в конфиге.
ss-config-usage: "Использование: /syncshield config <путь> <значение>"

# Подтверждение обновления конфига.
ss-config-updated: "✅ Конфигурация %path% установлена в %value%"

# Подтверждение после /syncshield reload.
ss-reloaded: "✅ Конфигурация и сообщения плагина перезагружены."

# Заголовок меню настроек 2FA игрока.
ss-2fa-settings-menu: "Настройки 2FA для %player%:"

# Заголовок меню глобальных настроек 2FA по умолчанию.
ss-default-2fa-menu: "Настройки 2FA по умолчанию (для OP/новых игроков):"

# Метка текущего режима 2FA.
ss-2fa-mode-current: "Текущий режим: %mode%"

# Подтверждение после обновления режима 2FA для игрока.
ss-2fa-mode-updated: "✅ Режим 2FA для %player% обновлен на %mode%"

# Заголовок меню настроек уведомлений.
ss-settings-menu: "Настройки уведомлений:"

# Индикаторы статуса.
ss-enabled: "✅"
ss-disabled: "❌"

# Приветственное сообщение при команде /start.
# %chatId% - ID чата Telegram.
ss-start: "Привет! Ваш Chat ID: <code>%chatId%</code>\n\n<b>Как привязать аккаунт:</b>\n1. Зайдите на сервер Minecraft.\n2. Если ваш аккаунт не привязан, вы увидите 10-значный код в сообщении о кике.\n3. Отправьте этот код боту (например, <code>/mclink ABCDEFGHIJ</code> или просто <code>ABCDEFGHIJ</code>).\n\n<b>Команды бота:</b>\n/start - Показать это сообщение и главное меню\n/mclink &lt;код&gt; - Привязать ваш Minecraft аккаунт\n\n<b>Команды администратора (если есть доступ):</b>\n/players - Список и управление игроками онлайн\n/settings - Настройка уведомлений бота\n/rcon &lt;команда&gt; - Выполнить консольную команду (или просто /&lt;команда&gt;)\n/cancel - Отменить текущее действие"

# Заголовок меню управления своим аккаунтом.
ss-me-menu: "Управление аккаунтом: %player%"

# Подтверждение после блокировки своего текущего IP.
ss-blacklisted-self: "✅ Ваш текущий IP (%ip%) был заблокирован для аккаунта %player%."

# Ошибка, если нет привязанных аккаунтов.
ss-no-linked-accounts: "У вас нет привязанных аккаунтов."

# Заголовок меню выбора аккаунта для управления.
ss-select-account: "Выберите аккаунт для управления:"

# Заголовок меню выбора игрока для управления ЧС.
ss-blacklist-players-menu: "Выберите игрока для управления ЧС:"

# Заголовок меню черного списка IP игрока.
ss-blacklist-ips-menu: "Черный список IP для %player%:"

# Сообщение об успешном удалении IP из черного списка.
ss-ip-removed: "✅ IP %ip% удален из черного списка для %player%"

# Ошибка, когда в черном списке нет IP.
ss-no-blacklist-found: "Черный список пуст."

# Ошибка, когда у конкретного игрока нет заблокированных IP.
ss-no-blacklist-player: "Черный список для %player% пуст."

# Ошибка, когда одобренные IP не найдены.
ss-no-approved-ips: "Одобренные IP для %player% не найдены."

# Метка для постоянных IP в вайтлисте.
ss-time-permanent: "Навсегда"

# Заголовок для собственного черного списка.
ss-my-blacklist: "Ваш черный список IP (%player%):"

# Заголовок для собственного списка одобренных IP.
ss-my-whitelist: "Ваши одобренные IP (%player%):"

# Подтверждение удаления IP из списка одобренных.
ss-ip-removed-whitelist: "✅ IP %ip% удален из списка одобренных для %player%"

# --- Форматы синхронизации чата ---

# HTML формат для пересылаемых сообщений MC. Используйте %message% для текста сообщения.
# %player% is the Minecraft username.
chat-sync-telegram-format: "<b>%player%</b>: %message%"

# Формат чата Minecraft для сообщений из Telegram. Используйте %message% для текста сообщения.
# Supports standard Minecraft color codes with '&'.
chat-sync-mc-format: "&7[SS] &f%player%: %message%"

# HTML формат для сообщений о достижениях. Используйте %advancement% для названия и %description% для описания.
chat-sync-advancement-format: "<i>%player%</i> получил достижение <b>%advancement%</b> (%description%)"

# HTML формат для сообщений о входе. Используйте %player% для имени игрока.
chat-sync-join-format: "<i>%player% вошел в игру</i>"

# HTML формат для сообщений о выходе. Используйте %player% для имени игрока.
chat-sync-quit-format: "<i>%player% вышел из игры</i>"

# HTML формат для сообщений о смерти. Используйте %player% и %message%.
chat-sync-death-format: "<i>%player% погиб: %message%</i>"


